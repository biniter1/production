name: Production CI/CD
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '20'
  REGISTRY: 'docker.io'
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan-secret:
    name: Scan secret in code
    runs-on: ["self-hosted","Linux","X64"]
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
  test:
    name: Test
    runs-on: ["self-hosted","Linux","X64"]
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm test -- --coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7
  build:
    name: Build
    runs-on: ["self-hosted","Linux","X64"]
    needs: [scan-secret,test]
    permissions:
      contents: read
      packages: write
    outputs:
      image-version: "${{ steps.meta.outputs.version }}"
      image-tag: ${{ env.REGISTRY }}/${{ github.repository_owner }}/app:${{ steps.meta.outputs.version }}
      image-digest: "${{ steps.build.outputs.digest }}"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup build
        uses: docker/setup-buildx-action@v3
      - name: Login to registry docker
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
      - name: Generate tag
        uses: docker/metadata-action@v5
        id: meta
        with:
          images: "${{env.REGISTRY}}/${{ github.repository_owner}}/app"
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and Push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: ${{github.event_name == 'push'}}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels}}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Scan image
        if: github.event_name == 'push'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{env.REGISTRY}}/${{github.repository_owner}}/app:${{steps.build.outputs.digest}}"
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          format: 'table'
  deploy-staging:
    name: Deploy to staging environment
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [build]
    environment:
      name: staging
      url: https://staging.myapp.com
    runs-on: ["self-hosted","Linux","X64"]
    steps:
      - name: Connect to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTNAME_STAGING}}
          username: ${{ secrets.USERNAME_STAGING }}
          key: ${{ secrets.PRIVATE_KEY_STAGING }}
          script  : |
            IMAGE="${{needs.build.outputs.image-tag}}"
            docker pull $IMAGE
            docker stop app-staging || true
            docker rm app-staging || true
            docker run -d \
              --name app-staging \
              --restart unless-stopped \
              -p 3000:3000 /
              --env-file /etc/app/staging.env \
              $IMAGE
      - name: Smoke test staging
        run: |
          sleep 15
          for i in $(seq 1 5); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://staging.myapp.com:3000/health || echo "000" )
            if [ "$STATUS" == "200" ];
            then
              echo "Smoke test pass"
            fi
            echo "Attempt $i: got $STATUS, retrying..."
            sleep 10
          done
          echo "Staging smoke test failed"
          exit 1
      - name: Notify about success of staging deployment
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "Staging deploy successfull - ready for production ",
              "attachments": [
                  {
                    "color": "#36a64f",
                    "fields": [
                      {"title": "Version", "value": "${{ needs.build.outputs.image-version }}", "short": true},
                      {"title": "By", "value": "${{ github.actor }}", "short": true},
                      {"title": "Staging URL", "value": "https://staging.myapp.com", "short": false}
                    ]
                  }
                ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
  deploy-production:
    name: Deploy to production environment
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://myapp.com
    needs: [deploy-staging,build]
    runs-on: ["self-hosted","Linux","X64"]
    steps:
      - name: Create backup version ready to roll back when production wrong
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTNAME_PRODUCTION }}
          username: ${{ secrets.USERNAME_PRODUCTION }}
          key: ${{ secrets.PRIVATE_KEY_PRODUCTION }}
          script: |
            CURRENT=$( docker inspect app-production \
              --format='{{.Config.Image}}'' 2>/dev/null || echo "none")
            echo $CURRENT > /etc/app/previous-image.txt
            echo "Backup successful $CURRENT"
      - name: Connect to server production and deploy
        id: deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTNAME_PRODUCTION }}
          username: ${{ secrets.USERNAME_PRODUCTION }}
          key: ${{ secrets.PRIVATE_KEY_PRODUCTION}}
          script: |
            IMAGE="${{ needs.build.outputs.image-tag }}"
            docker pull $IMAGE
            docker stop app-production || true
            docker rm app-production || true
            docker run -d \
             --name app-production \
             --restart unless-stopped \
             -p 3000:3000 \
             --env-file /etc/app/production.env \
             $IMAGE
      - name: Smoke test production
        run: |
          sleep 15
          for i in $(seq 1 5); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://myapp.com:3000/health) || echo "000")
            if [ "$STATUS" == "200"];
            then
              echo "Smoke test pass"
            fi
            echo "Attempt $i: got $STATUS, retrying..."
            sleep 10
          done
          echo "Production smoke test failed"
          exit 1
      - name: Auto roll back when production wrong
        if: failure() && steps.deploy.outcome == 'success'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTNAME_PRODUCTION }}
          username: ${{ secrets.USERNAME_PRODUCTION }}
          key: ${{ secrets.PRIVATE_KEY_PRODUCTION}}
          script: |
            PREV=$(cat /etc/app/previous-image.txt 2>/dev/null )
            if [ -n "$PREV" && "$PREV" != "none" ]; then
              docker stop app-production || true
              docker rm app-production || true
              docker run -d \
                --name app-production \
                --restart unless-stopped \
                -p 3000:3000 \ 
                --env-file /etc/app/production.env \
                $PREV
              echo "Rolled back to $PREV"
            else
              echo "No previous rollback verison"
            fi
      - name: Notify about success of production deployment
        if: always()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '🚀 Production deployed!' || '🚨 Production deploy FAILED — check immediately!' }}",
              "attachments": [{
                "color": "${{ job.status == 'success' && '#36a64f' || '#ff0000' }}",
                "fields": [
                  {"title": "Status", "value": "${{ job.status }}", "short": true},
                  {"title": "Version", "value": "${{ needs.build.outputs.image-version }}", "short": true},
                  {"title": "Deployed by", "value": "${{ github.actor }}", "short": true},
                  {"title": "Commit", "value": "${{ github.sha }}", "short": true}
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK










  



    




          